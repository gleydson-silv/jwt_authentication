{% extends 'users/base.html' %}

{% block title %}Auth Studio · Excluir Conta{% endblock %}

{% block content %}
<section class="form-shell">
  <div class="form-header">
    <h1>Excluir conta</h1>
    <p>Remoção definitiva do usuário autenticado. Esta ação não pode ser desfeita.</p>
  </div>
  <form class="form" data-endpoint="/account/delete/" data-method="DELETE" data-auth="true" data-redirect="/app/">
    <label class="checkbox">
      <input type="checkbox" name="confirm" required />
      <span>Confirmo que quero apagar minha conta.</span>
    </label>
    <button class="button danger" type="submit">Excluir conta</button>
  </form>
  <div class="result" data-result></div>
</section>
{% endblock %}
