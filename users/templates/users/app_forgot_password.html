{% extends 'users/base.html' %}

{% block title %}Auth Studio · Recuperar Senha{% endblock %}

{% block content %}
<section class="form-shell">
  <div class="form-header">
    <h1>Recuperar senha</h1>
    <p>Informe o e-mail e enviaremos o link de redefinição.</p>
  </div>
  <form class="form" data-endpoint="/forgot_password/" data-method="POST" data-redirect="/app/login/">
    <label class="field">
      <span>E-mail</span>
      <input type="email" name="email" placeholder="voce@email.com" required />
    </label>
    <button class="button primary" type="submit">Enviar link</button>
  </form>
  <div class="result" data-result></div>
</section>
{% endblock %}
