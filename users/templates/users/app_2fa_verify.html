{% extends 'users/base.html' %}

{% block title %}Auth Studio · Verificar 2FA{% endblock %}

{% block content %}
<section class="form-shell">
  <div class="form-header">
    <h1>Verificar 2FA</h1>
    <p>Informe o e-mail e o código do seu app autenticador.</p>
  </div>
  <form class="form" data-endpoint="/2fa/verify/" data-method="POST" data-redirect="/app/profile/">
    <label class="field">
      <span>E-mail</span>
      <input type="email" name="email" placeholder="voce@email.com" required data-prefill="pending-email" />
    </label>
    <label class="field">
      <span>Código</span>
      <input type="text" name="code" placeholder="123456" required />
    </label>
    <button class="button primary" type="submit">Validar 2FA</button>
  </form>
  <div class="result" data-result></div>
</section>
{% endblock %}
