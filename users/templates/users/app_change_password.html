{% extends 'users/base.html' %}

{% block title %}Auth Studio · Trocar Senha{% endblock %}

{% block content %}
<section class="form-shell">
  <div class="form-header">
    <h1>Trocar senha</h1>
    <p>Atualize a senha usando o token de autenticação atual.</p>
  </div>
  <form class="form" data-endpoint="/change_password/" data-method="POST" data-auth="true" data-redirect="/app/security/">
    <label class="field">
      <span>Senha atual</span>
      <input type="password" name="current_password" placeholder="Senha atual" required />
    </label>
    <label class="field">
      <span>Nova senha</span>
      <input type="password" name="new_password" placeholder="Nova senha" required />
    </label>
    <button class="button primary" type="submit">Atualizar senha</button>
  </form>
  <div class="result" data-result></div>
</section>
{% endblock %}
